name: Refresh Banzuke Data

on:
  schedule:
    # Run daily at 6:00 AM JST (9:00 PM UTC previous day)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch banzuke data
        run: node scripts/fetch-banzuke.mjs
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/latest-banzuke.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh banzuke data"
            git push
          fi
