name: Refresh Banzuke Data

on:
  schedule:
    # Run daily at 6:00 AM JST (9:00 PM UTC previous day)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch banzuke data
        run: node scripts/fetch-banzuke.mjs
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: refresh banzuke data"
          title: "chore: refresh banzuke data"
          body: |
            Automated banzuke data refresh.
            
            This PR was created automatically by the refresh-banzuke workflow.
          branch: refresh-banzuke-data
          delete-branch: true
