<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grand Sumo Banzuke</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1p&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__meta">
        <p class="badge">Live from the Japan Sumo Association</p>
      </div>
      <h1>Grand Sumo Banzuke</h1>
      <dl class="hero__summary" aria-live="polite">
        <div>
          <dt>Basho</dt>
          <dd id="basho-name">—</dd>
        </div>
        <div>
          <dt>Dates</dt>
          <dd id="basho-dates">—</dd>
        </div>
        <div>
          <dt>Announced</dt>
          <dd id="banzuke-announcement">—</dd>
        </div>
      </dl>
    </header>

    <main>
      <div id="status" role="status" class="status">Loading the banzuke…</div>
      <div id="banzuke-results" class="banzuke-grid" hidden></div>
    </main>

    <footer>
      <p>
        Data source:
        <a href="https://sumo.or.jp/" target="_blank" rel="noreferrer">Japan Sumo Association</a>.
        Crafted by
        <a href="https://www.linkedin.com/in/jonathon2" target="_blank" rel="noreferrer"
          >Jon Allen</a
        >.
      </p>
    </footer>

    <script type="module" src="./main.js?v=20241206"></script>
